name: Android CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build And Test
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      ANDROID_USER_HOME: ${{ github.workspace }}/.android-user-home
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GOLEMIO_API_KEY: ${{ secrets.GOLEMIO_API_KEY }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine Whether Android Build Is Needed
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual-dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "reason=no-base-sha" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          echo "Changed files:"
          if [[ -n "$changed_files" ]]; then
            printf '%s\n' "$changed_files"
          else
            echo "(none)"
          fi

          if printf '%s\n' "$changed_files" | grep -Eq '^(mobile/|wear/|gradle/|\.github/workflows/android-ci\.yml$|\.github/workflows/wear-screenshot-record\.yml$|\.github/workflows/wear-ui-tests\.yml$|build\.gradle\.kts$|settings\.gradle\.kts$|gradle\.properties$|gradlew$|gradlew\.bat$)'; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "reason=relevant-files-changed" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "reason=docs-or-non-android-change" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Android Build
        if: steps.changes.outputs.should_build != 'true'
        run: |
          echo "Skipping Android build because no Android-relevant files changed."
          echo "This keeps the required check green for docs, README, and other repo-only changes."

      - name: Make Gradle Wrapper Executable
        if: steps.changes.outputs.should_build == 'true'
        run: chmod +x ./gradlew

      - name: Set Up JDK 21
        if: steps.changes.outputs.should_build == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set Up Gradle
        if: steps.changes.outputs.should_build == 'true'
        uses: gradle/actions/setup-gradle@v5

      - name: Set Up Android SDK
        if: steps.changes.outputs.should_build == 'true'
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools build-tools;36.0.0 platforms;android-36"

      - name: Configure Stable Debug Keystore
        if: steps.changes.outputs.should_build == 'true' && secrets.ANDROID_DEBUG_KEYSTORE_BASE64 != ''
        shell: bash
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.ANDROID_DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.ANDROID_DEBUG_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          keystore_dir="$RUNNER_TEMP/android-signing"
          mkdir -p "$keystore_dir"
          printf '%s' "$DEBUG_KEYSTORE_BASE64" | base64 --decode > "$keystore_dir/debug.keystore"
          {
            echo "CI_DEBUG_KEYSTORE_PATH=$keystore_dir/debug.keystore"
            echo "CI_DEBUG_KEYSTORE_PASSWORD=${DEBUG_KEYSTORE_PASSWORD:-android}"
            echo "CI_DEBUG_KEY_ALIAS=${DEBUG_KEY_ALIAS:-androiddebugkey}"
            echo "CI_DEBUG_KEY_PASSWORD=${DEBUG_KEY_PASSWORD:-${DEBUG_KEYSTORE_PASSWORD:-android}}"
          } >> "$GITHUB_ENV"

      - name: Build, Lint, And Test
        if: steps.changes.outputs.should_build == 'true'
        run: >
          ./gradlew
          --no-daemon
          --stacktrace
          --continue
          :mobile:assembleDebug
          :wear:lintDebug
          :wear:assembleDebug
          :wear:assembleDebugAndroidTest
          :wear:testDebugUnitTest
          -Proborazzi.test.verify=true

      - name: Upload APKs
        if: always() && steps.changes.outputs.should_build == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: android-apks
          compression-level: 0
          if-no-files-found: warn
          retention-days: 14
          path: |
            mobile/build/outputs/apk/debug/mobile-debug.apk
            mobile/build/outputs/apk/debug/output-metadata.json
            wear/build/outputs/apk/debug/wear-debug.apk
            wear/build/outputs/apk/debug/output-metadata.json
            wear/build/outputs/apk/androidTest/debug/wear-debug-androidTest.apk
            wear/build/outputs/apk/androidTest/debug/output-metadata.json

      - name: Upload Reports
        if: always() && steps.changes.outputs.should_build == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: android-reports
          if-no-files-found: warn
          retention-days: 14
          path: |
            wear/build/reports/lint-results-debug.html
            wear/build/reports/lint-results-debug.txt
            wear/build/reports/lint-results-debug.xml
            wear/build/reports/tests/testDebugUnitTest/**
            wear/build/test-results/testDebugUnitTest/**/*.xml
            wear/build/test-results/roborazzi/**

name: Wear UI Tests

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wear-ui-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instrumented-tests:
    name: Run Instrumented Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANDROID_USER_HOME: ${{ github.workspace }}/.android-user-home
      GOLEMIO_API_KEY: ${{ secrets.GOLEMIO_API_KEY }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v5

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set Up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools build-tools;36.0.0 platforms;android-36"

      - name: Enable KVM Access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Wear Instrumented Tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: android-wear
          arch: x86_64
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: ./gradlew --no-daemon --stacktrace :wear:connectedDebugAndroidTest

      - name: Upload UI Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wear-ui-test-reports
          if-no-files-found: warn
          retention-days: 14
          path: |
            wear/build/reports/androidTests/connected/**
            wear/build/outputs/androidTest-results/connected/**

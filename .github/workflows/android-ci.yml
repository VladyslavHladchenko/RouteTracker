name: Android CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - converted_to_draft
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build And Test
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      ANDROID_USER_HOME: ${{ github.workspace }}/.android-user-home
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GOLEMIO_API_KEY: ${{ secrets.GOLEMIO_API_KEY }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine Android Validation Mode
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "validation_mode=full" >> "$GITHUB_OUTPUT"
            echo "run_mobile_smoke=true" >> "$GITHUB_OUTPUT"
            echo "run_wear_smoke=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual-dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "validation_mode=full" >> "$GITHUB_OUTPUT"
            echo "run_mobile_smoke=true" >> "$GITHUB_OUTPUT"
            echo "run_wear_smoke=true" >> "$GITHUB_OUTPUT"
            echo "reason=no-base-sha" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          echo "Changed files:"
          if [[ -n "$changed_files" ]]; then
            printf '%s\n' "$changed_files"
          else
            echo "(none)"
          fi

          run_mobile_smoke=false
          if printf '%s\n' "$changed_files" | grep -Eq '^(mobile/|gradle/|build\.gradle\.kts$|settings\.gradle\.kts$|gradle\.properties$|gradlew$|gradlew\.bat$)'; then
            run_mobile_smoke=true
          fi

          run_wear_smoke=false
          if printf '%s\n' "$changed_files" | grep -Eq '^(wear/|gradle/|\.github/workflows/android-ci\.yml$|\.github/workflows/wear-screenshot-record\.yml$|\.github/workflows/wear-ui-tests\.yml$|build\.gradle\.kts$|settings\.gradle\.kts$|gradle\.properties$|gradlew$|gradlew\.bat$)'; then
            run_wear_smoke=true
          fi

          echo "run_mobile_smoke=$run_mobile_smoke" >> "$GITHUB_OUTPUT"
          echo "run_wear_smoke=$run_wear_smoke" >> "$GITHUB_OUTPUT"

          if printf '%s\n' "$changed_files" | grep -Eq '^(mobile/|wear/|gradle/|\.github/workflows/android-ci\.yml$|\.github/workflows/wear-screenshot-record\.yml$|\.github/workflows/wear-ui-tests\.yml$|build\.gradle\.kts$|settings\.gradle\.kts$|gradle\.properties$|gradlew$|gradlew\.bat$)'; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.draft }}" == "true" ]]; then
              echo "validation_mode=draft" >> "$GITHUB_OUTPUT"
              echo "reason=draft-pr-reduced-validation" >> "$GITHUB_OUTPUT"
            else
              echo "validation_mode=full" >> "$GITHUB_OUTPUT"
              echo "reason=ready-for-review-or-main" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "validation_mode=skip" >> "$GITHUB_OUTPUT"
            echo "reason=docs-or-non-android-change" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Android Build
        if: steps.changes.outputs.should_build != 'true'
        run: |
          echo "Skipping Android build because no Android-relevant files changed."
          echo "This keeps the required check green for docs, README, and other repo-only changes."

      - name: Describe Draft Validation
        if: steps.changes.outputs.validation_mode == 'draft'
        run: |
          echo "Draft PR detected."
          echo "Running reduced Android CI smoke validation only."
          echo "Full APK, lint, and unit-test validation will run after the PR is marked ready for review."

      - name: Make Gradle Wrapper Executable
        if: steps.changes.outputs.should_build == 'true'
        run: chmod +x ./gradlew

      - name: Set Up JDK 21
        if: steps.changes.outputs.should_build == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set Up Gradle
        if: steps.changes.outputs.should_build == 'true'
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Set Up Android SDK
        if: steps.changes.outputs.should_build == 'true'
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools build-tools;36.0.0 platforms;android-36"

      - name: Configure Stable Debug Keystore
        if: steps.changes.outputs.should_build == 'true'
        shell: bash
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.ANDROID_DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.ANDROID_DEBUG_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${DEBUG_KEYSTORE_BASE64:-}" ]]; then
            echo "No stable debug keystore configured."
            exit 0
          fi
          keystore_dir="$RUNNER_TEMP/android-signing"
          mkdir -p "$keystore_dir"
          printf '%s' "$DEBUG_KEYSTORE_BASE64" | base64 --decode > "$keystore_dir/debug.keystore"
          {
            echo "CI_DEBUG_KEYSTORE_PATH=$keystore_dir/debug.keystore"
            echo "CI_DEBUG_KEYSTORE_PASSWORD=${DEBUG_KEYSTORE_PASSWORD:-android}"
            echo "CI_DEBUG_KEY_ALIAS=${DEBUG_KEY_ALIAS:-androiddebugkey}"
            echo "CI_DEBUG_KEY_PASSWORD=${DEBUG_KEY_PASSWORD:-${DEBUG_KEYSTORE_PASSWORD:-android}}"
          } >> "$GITHUB_ENV"

      - name: Build Draft Smoke Targets
        id: draft_smoke_build
        if: steps.changes.outputs.validation_mode == 'draft'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          targets=()

          if [[ "${{ steps.changes.outputs.run_mobile_smoke }}" == "true" ]]; then
            targets+=(":mobile:assembleDebug")
          fi

          if [[ "${{ steps.changes.outputs.run_wear_smoke }}" == "true" ]]; then
            targets+=(":wear:assembleDebug")
          fi

          if [[ "${#targets[@]}" -eq 0 ]]; then
            echo "No smoke targets selected for draft validation."
            exit 0
          fi

          ./gradlew \
            --stacktrace \
            --configuration-cache \
            --configuration-cache-problems=warn \
            "${targets[@]}"

      - name: Build APKs
        id: build_apks
        if: steps.changes.outputs.validation_mode == 'full'
        continue-on-error: true
        run: >
          ./gradlew
          --stacktrace
          --configuration-cache
          --configuration-cache-problems=warn
          --continue
          :mobile:assembleDebug
          :wear:assembleDebug
          :wear:assembleDebugAndroidTest

      - name: Lint Wear
        id: lint_wear
        if: steps.changes.outputs.validation_mode == 'full'
        continue-on-error: true
        run: >
          ./gradlew
          --stacktrace
          --configuration-cache
          --configuration-cache-problems=warn
          :wear:lintDebug

      - name: Run Wear Unit Tests
        id: wear_unit_tests
        if: steps.changes.outputs.validation_mode == 'full'
        continue-on-error: true
        run: >
          ./gradlew
          --stacktrace
          --configuration-cache
          --configuration-cache-problems=warn
          :wear:testDebugUnitTest
          -Proborazzi.test.verify=true

      - name: Upload APKs
        if: always() && steps.changes.outputs.validation_mode == 'full'
        uses: actions/upload-artifact@v6
        with:
          name: android-apks
          compression-level: 0
          if-no-files-found: warn
          retention-days: 14
          path: |
            mobile/build/outputs/apk/debug/mobile-debug.apk
            mobile/build/outputs/apk/debug/output-metadata.json
            wear/build/outputs/apk/debug/wear-debug.apk
            wear/build/outputs/apk/debug/output-metadata.json
            wear/build/outputs/apk/androidTest/debug/wear-debug-androidTest.apk
            wear/build/outputs/apk/androidTest/debug/output-metadata.json

      - name: Upload Reports
        if: always() && steps.changes.outputs.validation_mode == 'full'
        uses: actions/upload-artifact@v6
        with:
          name: android-reports
          if-no-files-found: warn
          retention-days: 14
          path: |
            wear/build/reports/lint-results-debug.html
            wear/build/reports/lint-results-debug.txt
            wear/build/reports/lint-results-debug.xml
            wear/build/reports/tests/testDebugUnitTest/**
            wear/build/test-results/testDebugUnitTest/**/*.xml
            wear/build/test-results/roborazzi/**

      - name: Fail If Validation Failed
        if: always() && steps.changes.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail

          failed=0

          if [[ "${{ steps.changes.outputs.validation_mode }}" == "draft" ]]; then
            if [[ "${{ steps.draft_smoke_build.outcome }}" != "success" ]]; then
              echo "Draft smoke build failed."
              failed=1
            fi
          else
            if [[ "${{ steps.build_apks.outcome }}" != "success" ]]; then
              echo "Build APKs failed."
              failed=1
            fi

            if [[ "${{ steps.lint_wear.outcome }}" != "success" ]]; then
              echo "Lint Wear failed."
              failed=1
            fi

            if [[ "${{ steps.wear_unit_tests.outcome }}" != "success" ]]; then
              echo "Run Wear Unit Tests failed."
              failed=1
            fi
          fi

          if [[ "$failed" -ne 0 ]]; then
            exit 1
          fi

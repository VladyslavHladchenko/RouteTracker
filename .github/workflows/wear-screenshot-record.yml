name: Wear Screenshot Record

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wear-screenshot-record-${{ github.ref }}
  cancel-in-progress: true

jobs:
  record:
    name: Record Screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      ANDROID_USER_HOME: ${{ github.workspace }}/.android-user-home
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GOLEMIO_API_KEY: ${{ secrets.GOLEMIO_API_KEY }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v5

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set Up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools build-tools;36.0.0 platforms;android-36"

      - name: Record Wear Screenshots
        run: >
          ./gradlew
          --stacktrace
          :wear:testDebugUnitTest
          --tests
          com.example.routetracker.presentation.WearScreenshotTest
          -Proborazzi.test.record=true

      - name: Upload Screenshot Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wear-screenshots
          compression-level: 0
          if-no-files-found: warn
          retention-days: 14
          path: |
            wear/src/test/screenshots/**/*.png
            wear/build/reports/tests/testDebugUnitTest/**
            wear/build/test-results/testDebugUnitTest/**/*.xml
            wear/build/test-results/roborazzi/**

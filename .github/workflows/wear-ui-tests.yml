name: Wear UI Tests

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wear-ui-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instrumented-tests:
    name: Run Instrumented Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANDROID_USER_HOME: ${{ github.workspace }}/.android-user-home
      ANDROID_EMULATOR_HOME: ${{ github.workspace }}/.android-user-home
      ANDROID_AVD_HOME: ${{ github.workspace }}/.android-user-home/avd
      ANDROID_SDK_HOME: ${{ github.workspace }}/.android-user-home
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GOLEMIO_API_KEY: ${{ secrets.GOLEMIO_API_KEY }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v5

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set Up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools build-tools;36.0.0 platforms;android-36 emulator system-images;android-36;android-wear-signed;x86_64"

      - name: Enable KVM Access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create Wear AVD
        run: |
          mkdir -p "$ANDROID_EMULATOR_HOME" "$ANDROID_AVD_HOME"
          echo "no" | avdmanager create avd --force --name wear-ci --package "system-images;android-36;android-wear-signed;x86_64" --device "wearos_small_round"
          "$ANDROID_HOME/emulator/emulator" -list-avds | grep -Fx "wear-ci"

      - name: Start Wear Emulator
        run: |
          nohup "$ANDROID_HOME/emulator/emulator" -avd wear-ci -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none > "$GITHUB_WORKSPACE/wear-emulator.log" 2>&1 &
          if ! timeout 300 adb wait-for-device; then
            cat "$GITHUB_WORKSPACE/wear-emulator.log"
            exit 1
          fi
          boot_completed=""
          for i in {1..120}; do
            boot_completed="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')"
            if [ "$boot_completed" = "1" ]; then
              break
            fi
            sleep 5
          done
          if [ "$boot_completed" != "1" ]; then
            cat "$GITHUB_WORKSPACE/wear-emulator.log"
            exit 1
          fi
          adb shell settings put global window_animation_scale 0 || true
          adb shell settings put global transition_animation_scale 0 || true
          adb shell settings put global animator_duration_scale 0 || true
          adb shell input keyevent 82 || true

      - name: Run Wear Instrumented Tests
        run: ./gradlew --no-daemon --stacktrace :wear:connectedDebugAndroidTest

      - name: Stop Wear Emulator
        if: always()
        run: adb -s emulator-5554 emu kill || true

      - name: Upload UI Test Reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wear-ui-test-reports
          if-no-files-found: warn
          retention-days: 14
          path: |
            wear/build/reports/androidTests/**
            wear/build/outputs/androidTest-results/**
            wear/build/test-results/**

      - name: Upload Emulator Log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wear-ui-emulator-log
          if-no-files-found: warn
          retention-days: 14
          path: wear-emulator.log
